name: Genera post brand Immobiliare Malfatti

on:
  workflow_dispatch: {} # solo manuale: lancialo quando aggiungi nuovi temi

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa le dipendenze
        run: pip install -r requirements.txt

      - name: Genera i post brand
        run: python generate_brand_posts.py

      - name: Commit e push se ci sono cambiamenti
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/brand-feed.xml docs/brand-images/
          git diff --staged --quiet || git commit -m "Genera post brand [automatico]"
          git push
